version: '3.8'
services:
  user-service:
    build: ./user-service
    env_file: ./user-service/.env
    ports:
      - '3000:3000'
    depends_on: []

  leave-service:
    build: ./leave-service
    env_file: ./leave-service/.env
    ports:
      - '4000:4000'
    depends_on:
      - user-service

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - '27017:27017'

  api-gateway:
    build: ./api-gateway
    env_file: ./api-gateway/.env
    ports:
      - '5000:5000'
    depends_on:
      - user-service
      - leave-service

volumes:
  mongo-data:

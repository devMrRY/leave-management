services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-gateway

  api-gateway:
    build: ./api-gateway
    env_file: ./api-gateway/.env
    expose:
      - '5000'
    depends_on:
      - consul
    environment:
      - DOCKER_ENV=true
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_NAME=api-gateway

    labels:
      co.elastic.logs/enabled: "true"

    develop:
      watch:
        - action: sync
          path: ./api-gateway
          target: /app
          ignore:
            - node_modules/

        - action: rebuild
          path: ./api-gateway/package.json

  consul:
    image: hashicorp/consul:latest
    container_name: consul-server
    ports:
      - '8500:8500'
      - '8600:8600/udp'
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0

  rabbitmq:
      image: rabbitmq:3-management
      container_name: rabbitmq
      ports:
        - "5672:5672"    # AMQP
        - "15672:15672"  # UI dashboard
      environment:
        RABBITMQ_DEFAULT_USER: admin
        RABBITMQ_DEFAULT_PASS: admin
      healthcheck:
        test: ["CMD", "rabbitmq-diagnostics", "ping"]
        interval: 5s
        timeout: 5s
        retries: 10

  notification-service:
    build: ./notification-service
    env_file: ./notification-service/.env
    expose:
      - '7000'
    depends_on:
      - rabbitmq
      - consul
    environment:
      - DOCKER_ENV=true
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_NAME=notification-service
    labels:
      co.elastic.logs/enabled: "true"
    develop:
      watch:
        - action: sync
          path: ./notification-service
          target: /app
          ignore:
            - node_modules/

        - action: rebuild
          path: ./notification-service/package.json
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - '27018:27017'

  user-service:
    build: ./user-service
    env_file: ./user-service/.env
    expose:
      - '3000'
    depends_on:
      - consul
      - mongo
      - jaeger
    environment:
      - DOCKER_ENV=true
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_NAME=user-service
    labels:
      co.elastic.logs/enabled: "true"
    develop:
      watch:
        - action: sync
          path: ./user-service
          target: /app
          ignore:
            - node_modules/

        - action: rebuild
          path: ./user-service/package.json

  leave-service:
    build: ./leave-service
    env_file: ./leave-service/.env
    # ports:
    #   - '4000:4000'
    expose:
      - '4000'
    depends_on:
      - consul
    environment:
      - DOCKER_ENV=true
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - SERVICE_NAME=leave-service
    labels:
      co.elastic.logs/enabled: "true"
    develop:
      watch:
        - action: sync
          path: ./leave-service
          target: /app
          ignore:
            - node_modules/

        - action: rebuild
          path: ./leave-service/package.json

  jaeger:
    image: jaegertracing/jaeger:2.8.0
    container_name: jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.0
    user: root
    depends_on:
      - elasticsearch
    command:
      - filebeat
      - -e
      - --strict.perms=false
      - -c
      - /usr/share/filebeat/filebeat.yml
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

volumes:
  mongo-data: